<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropFirms Plaza | Premium Prop Firm Discovery</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1fd655', // Vibrant Green
            secondary: '#15a13c', // Darker Green
            accent: '#0a6321', // Deep Green
            dark: '#050a06', // Very Dark Green/Black
            'dark-mid': '#0a140c', // Slightly lighter dark
            'dark-card': '#0f1a12', // Card background
            'text-light': '#E2E8F0', // Slate 200
            'text-muted': '#94A3B8', // Slate 400
            white: '#FFFFFF',
            'brand-gold': '#F59E0B',
            'brand-goldHover': '#D97706',
            'brand-dark': '#050a06',
            'brand-black': '#000000',
            'brand-charcoal': '#0a140c',
            'brand-surface': '#0f1a12',
            'brand-border': '#15a13c',
            'brand-muted': '#94A3B8',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Clash Display', 'Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          animation: {
            'blob': 'blob 10s infinite',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'marquee': 'marquee 40s linear infinite',
          },
          keyframes: {
            marquee: {
              '0%': { transform: 'translateX(0%)' },
              '100%': { transform: 'translateX(-100%)' },
            },
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    body {
      background-color: #050a06;
      /* Removed purple/blue #030014, updated to standard brand dark */
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(31, 214, 85, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(21, 161, 60, 0.08), transparent 25%);
      background-attachment: fixed;
    }

    .glass-panel {
      background: rgba(10, 20, 12, 0.7);
      /* Removed purple/blue rgba(15, 11, 30, 0.7) */
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      transition: border-color 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease, background 0.4s ease;
    }

    .glass-card:hover {
      border-color: #1fd655;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -10px rgba(31, 214, 85, 0.3);
    }

    .premium-gradient-text {
      background: linear-gradient(135deg, #1fd655 0%, #15a13c 50%, #0a6321 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: gradientMove 5s ease infinite;
    }

    @keyframes gradientMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .btn-primary {
      background: linear-gradient(90deg, #1fd655 0%, #15a13c 40%, #0a6321 100%);
      background-size: 200% auto;
      position: relative;
      overflow: hidden;
      z-index: 1;
      border: none;
      transition: 0.5s;
    }

    .btn-primary:hover {
      background-position: right center;
      /* change the direction of the change here */
      color: #fff;
      text-decoration: none;
      box-shadow: 0 0 20px rgba(31, 214, 85, 0.4);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #050a06;
      /* Removed purple/blue #030014 */
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
